<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg: #eef3f8;
      --text: #14324a;
      --muted: #5b7287;
      --brand: #1967d2;
      --shadow: 0 24px 60px rgba(23, 42, 58, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 111, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #f7fbff 0%, var(--bg) 100%);
    }

    .shell {
      width: min(960px, calc(100% - 32px));
      margin: 32px auto;
    }

    .hero, .card {
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 30px;
      color: #fff;
      background: linear-gradient(135deg, rgba(16, 86, 170, 0.96), rgba(20, 50, 74, 0.92));
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 38px;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.76);
      line-height: 1.7;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      margin-top: 14px;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.84);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .github-link:hover {
      background: rgba(255, 255, 255, 0.20);
      color: #fff;
    }

    .card {
      margin-top: 20px;
      background: rgba(255,255,255,0.92);
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.72);
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 13px;
    }

    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(20, 50, 74, 0.12);
      font-size: 14px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .button, .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .button.primary, .link-button.primary {
      background: var(--brand);
      color: #fff;
    }

    .button.secondary, .link-button.secondary {
      background: rgba(20, 50, 74, 0.08);
      color: var(--text);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      min-width: 220px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(20, 50, 74, 0.92);
      color: #ffffff;
      box-shadow: 0 20px 40px rgba(23, 42, 58, 0.22);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: all 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Accio 多账号管理面板</h1>
      <p>管理操作需要管理员密码。OAuth 登录、复制登录链接和手动导入回调地址，已经单独拆到了独立页面。</p>
      <a class="github-link" href="https://github.com/caidaoli/accio-manager" target="_blank" rel="noreferrer">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:middle;margin-right:6px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
    </section>

    <section class="card">
      <label class="label" for="admin-password">管理员密码</label>
      <input id="admin-password" class="input" type="password" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')loginAdmin()">
      <div class="hint">
        本地回调地址：{{ callback_url }}<br>
        OAuth 页面：{{ oauth_url }}
      </div>

      <div class="actions">
        <button class="button primary" type="button" onclick="loginAdmin()">登录面板</button>
        <a class="link-button secondary" href="{{ oauth_url }}" target="_blank" rel="noreferrer">打开 OAuth 页面</a>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    async function loginAdmin() {
      const password = document.getElementById('admin-password').value;
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });
        const payload = await response.json();
        showToast(payload.message || '登录完成');
        if (payload.success) {
          window.setTimeout(() => window.location.reload(), 300);
        }
      } catch (error) {
        console.error(error);
        showToast('登录失败，请稍后重试');
      }
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      window.clearTimeout(window.__accioToastTimer);
      window.__accioToastTimer = window.setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }
  </script>
</body>
</html>
